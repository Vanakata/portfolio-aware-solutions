# Production stack — lives on the NAS at /volume1/docker/portfolio/docker-compose.yml
# Mirrors the BookMe/MyStash setup: prebuilt Docker Hub image + scoped watchtower.
# Bring up with:  docker compose up -d
services:
  portfolio:
    image: vanakata/portfolio:latest
    restart: unless-stopped
    ports:
      # host 8086 → container 3000 (Next.js). Pick any free host port; it's what
      # the Cloudflare tunnel public hostname points at (http://<NAS_IP>:8086).
      - "8086:3000"
    environment:
      - NODE_ENV=production
    labels:
      # Only containers in this scope are auto-updated by the watchtower below.
      - "com.centurylinklabs.watchtower.scope=portfolio"

  # Polls Docker Hub and recreates the portfolio container on a new image push.
  # Scoped to "portfolio" so it ignores the bookme/stash containers on the NAS.
  # Acts as a backstop to the CI deploy (build-deploy.yml).
  watchtower:
    image: containrrr/watchtower
    restart: unless-stopped
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
    command: --interval 300 --cleanup --scope portfolio
    labels:
      - "com.centurylinklabs.watchtower.scope=portfolio"

  # Self-hosted GitHub Actions runner for the CI deploy. Self-registers against
  # Vanakata/portfolio-aware-solutions on startup; confirm it shows up under
  # Settings → Actions → Runners as `portfolio-runner`.
  github-runner:
    image: myoung34/github-runner:latest
    restart: unless-stopped
    environment:
      REPO_URL: https://github.com/Vanakata/portfolio-aware-solutions
      ACCESS_TOKEN: ${GITHUB_PAT}
      RUNNER_NAME: portfolio-runner
      RUNNER_SCOPE: repo
      LABELS: self-hosted,Linux,X64
      RUNNER_WORKDIR: /volume1/docker/portfolio/runner/work
    volumes:
      - /var/run/docker.sock:/var/run/docker.sock
      - /volume1/docker/portfolio:/volume1/docker/portfolio
      - /volume1/docker/portfolio/runner:/volume1/docker/portfolio/runner
